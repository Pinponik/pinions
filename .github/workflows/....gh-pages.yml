name: Deploy to GitHub Pages
on:
  push:
    branches: ["**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Documentation
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc -f markdown -t html -s README.md -o target/readme.html
          mkdir -p docs
          cp target/readme.html docs/index.html
